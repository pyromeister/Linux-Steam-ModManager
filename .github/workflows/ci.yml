name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: flake8 . --count --max-line-length=120 --exclude=__pycache__,.git
