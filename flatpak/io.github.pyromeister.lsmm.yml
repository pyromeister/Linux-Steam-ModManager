app-id: io.github.pyromeister.lsmm
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: lsmm-gui

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Steam libraries and game directories can be at arbitrary paths under $HOME,
  # including SD card mounts at /run/media. --filesystem=home is required for a
  # mod manager that reads and writes game data directories.
  - --filesystem=home
  - --filesystem=/run/media
  # Allows invoking LOOT via "flatpak run io.github.loot.loot" from inside sandbox
  - --talk-name=org.freedesktop.Flatpak
  # Required for GApplication D-Bus registration (single-instance, D-Bus activation)
  - --own-name=io.github.pyromeister.lsmm

modules:
  - name: unrar
    buildsystem: simple
    build-commands:
      - make -j${FLATPAK_BUILDER_N_JOBS:-1}
      - install -Dm755 unrar /app/bin/unrar
    sources:
      - type: archive
        url: https://www.rarlab.com/rar/unrarsrc-7.0.7.tar.gz
        sha256: da95829c7e66fe461c06eb4bea8145e58d88d76909432d0875cd1ff86669f728

  - name: python3-py7zr
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --no-deps --prefix=/app
          backports_zstd-1.5.0-cp312-cp312-manylinux2014_x86_64.manylinux_2_17_x86_64.manylinux_2_28_x86_64.whl
          brotli-1.2.0-cp312-cp312-manylinux2014_x86_64.manylinux_2_17_x86_64.whl
